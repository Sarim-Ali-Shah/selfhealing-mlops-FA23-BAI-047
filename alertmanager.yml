global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: jenkins-rollback-webhook

receivers:
  - name: jenkins-rollback-webhook
    webhook_configs:
      - url: 'http://3.106.156.32:8080/generic-webhook-trigger/invoke?token=ROLLBACK_7B88A5_TOKEN'
        http_config:
          basic_auth:
            username: 'admin'
            password: 'admin'
        send_resolved: false